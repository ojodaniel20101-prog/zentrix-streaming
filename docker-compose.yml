version: '3.8'

services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=mysql://root:password@db:3306/zentrix_streaming
      - JWT_SECRET=${JWT_SECRET}
      - OAUTH_SERVER_URL=${OAUTH_SERVER_URL}
      - VITE_APP_ID=${VITE_APP_ID}
    depends_on:
      - db
    networks:
      - zentrix-network

  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: zentrix_streaming
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - zentrix-network

volumes:
  db_data:

networks:
  zentrix-network:
